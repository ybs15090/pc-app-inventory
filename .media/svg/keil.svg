<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Keil MDK placeholder icon">
  <!-- 占位图标：微控制器芯片，方便日后替换为 Keil 正式 logo -->
  <rect width="128" height="128" rx="20" fill="#0f1b2d"/>
  <!-- 引脚 -->
  <g fill="#8a97a8">
    <rect x="36" y="20" width="8" height="12" rx="2"/>
    <rect x="60" y="20" width="8" height="12" rx="2"/>
    <rect x="84" y="20" width="8" height="12" rx="2"/>
    <rect x="36" y="96" width="8" height="12" rx="2"/>
    <rect x="60" y="96" width="8" height="12" rx="2"/>
    <rect x="84" y="96" width="8" height="12" rx="2"/>
    <rect x="20" y="36" width="12" height="8" rx="2"/>
    <rect x="20" y="60" width="12" height="8" rx="2"/>
    <rect x="20" y="84" width="12" height="8" rx="2"/>
    <rect x="96" y="36" width="12" height="8" rx="2"/>
    <rect x="96" y="60" width="12" height="8" rx="2"/>
    <rect x="96" y="84" width="12" height="8" rx="2"/>
  </g>
  <!-- 芯片主体 -->
  <rect x="32" y="32" width="64" height="64" rx="8" fill="#c8102e"/>
  <circle cx="42" cy="42" r="3.5" fill="#0f1b2d" opacity="0.55"/>
  <!-- 字母 K 占位 -->
  <text x="64" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">K</text>
</svg>
